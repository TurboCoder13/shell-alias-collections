# Labeler configuration for PR auto-labeling
# See: https://github.com/actions/labeler

collections:
  - changed-files:
      - any-glob-to-any-file: "collections/**/*.json"

curated:
  - changed-files:
      - any-glob-to-any-file: "collections/curated/**/*.json"

community:
  - changed-files:
      - any-glob-to-any-file: "collections/community/**/*.json"

manifest:
  - changed-files:
      - any-glob-to-any-file: "manifest.json"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**/*"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"
          - "scripts/**/*"
