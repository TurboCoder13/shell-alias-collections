# SPDX-License-Identifier: MIT
---
name: Release - Auto Tag
# Creates a git tag when a release PR is merged to main.

"on":
  push:
    branches: [main]
    paths:
      - manifest.json
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g., 1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-tag:
    permissions:
      contents: write
    name: Create release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    concurrency:
      group: release-tag-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create release tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ./scripts/ci/create-release-tag.sh --version "${{ inputs.version }}"
          else
            ./scripts/ci/create-release-tag.sh
          fi
