# SPDX-License-Identifier: MIT
---
name: Quality - Validate Collections
# Validates JSON syntax and schema for all collection files.
# Runs on PRs and pushes to main.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate JSON & Schema
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate JSON syntax
        run: ./scripts/ci/validate-json-syntax.sh

      - name: Validate manifest structure
        run: ./scripts/ci/validate-manifest-structure.sh

      - name: Validate collection files
        run: ./scripts/ci/validate-collection-files.sh
