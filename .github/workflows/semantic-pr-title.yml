# SPDX-License-Identifier: MIT
---
name: Quality - PR Title Validation
# Validates PR titles follow Conventional Commits format.
# Blocks merges if title format is invalid.

"on":
  pull_request:
    types: [opened, edited, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    concurrency:
      group: semantic-pr-title-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate PR title follows Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          TYPES_INPUT: |
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
        run: ./scripts/ci/semantic-pr-title-check.sh
