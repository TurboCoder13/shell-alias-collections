# SPDX-License-Identifier: MIT
---
name: Release - Automated PR Creation
# Computes next semantic version using conventional commits and opens release PR.

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-release-pr:
    permissions:
      contents: write
      pull-requests: write
      packages: read
    name: Compute next version and open Release PR
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        # yamllint disable-line rule:line-length
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and update manifest
        id: version
        env:
          MAX_BUMP: minor
        run: ./scripts/ci/create-release-pr.sh

      - name: Create Release PR
        id: cpr
        if: steps.version.outputs.bump_needed == 'true'
        # yamllint disable-line rule:line-length
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: >-
            chore(release): prepare v${{ steps.version.outputs.next_version }}
          title: >-
            chore(release): prepare v${{ steps.version.outputs.next_version }}
          body: |
            ## Release v${{ steps.version.outputs.next_version }}

            Automated version bump from
            `${{ steps.version.outputs.current_version }}`
            to `${{ steps.version.outputs.next_version }}`.

            ### Changes
            - Updates `manifest.json` version and lastUpdated fields

            ### What happens next
            1. This PR will be reviewed and merged
            2. A git tag `v${{ steps.version.outputs.next_version }}`
               will be created automatically
            3. A GitHub Release will be published with the
               collections artifact

            ---
            *This PR was created automatically by the release workflow.*
          branch: release/v${{ steps.version.outputs.next_version }}
          base: main
          labels: |
            release-bump

      - name: Enable auto-merge for Release PR
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        # yamllint disable-line rule:line-length
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" || true
